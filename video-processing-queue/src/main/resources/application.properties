quarkus.http.access-log.enabled=true
quarkus.http.record-request-start-time=true
quarkus.http.access-log.pattern=%{REQUEST_LINE} %{RESPONSE_CODE} %Dms

%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%dev.quarkus.hibernate-orm.log.sql=false

kafka.bootstrap.servers=localhost:9092

mp.messaging.outgoing.video-processing-requested-out.connector=smallrye-kafka
mp.messaging.outgoing.video-processing-requested-out.topic=video-processing-requested
mp.messaging.outgoing.video-processing-requested-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
